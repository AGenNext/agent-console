name: 🚀 Automated Deployment

on:
  push:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      target:
        description: 'Deployment target'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - creative-platform
          - agent-registry
          - deployment-scripts

concurrency:
  group: deployment
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - name: 📥 Checkout deployment-scripts
        uses: actions/checkout@v4
        with:
          path: deployment-scripts

      - name: 📥 Checkout creative-platform
        uses: actions/checkout@v4
        with:
          repository: openagx/creative-platform
          path: creative-platform
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: 📥 Checkout agent-registry
        uses: actions/checkout@v4
        with:
          repository: openagx/agent-registry
          path: agent-registry
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: 🔧 Setup Git
        run: |
          git config --global user.email "github-actions@openagx.dev"
          git config --global user.name "GitHub Actions"

      - name: 📤 Push deployment-scripts
        if: github.event.inputs.target == 'all' || github.event.inputs.target == 'deployment-scripts' || github.event_name == 'push'
        run: |
          cd deployment-scripts
          git push origin main || echo "Already up to date"

      - name: 📤 Push creative-platform
        if: github.event.inputs.target == 'all' || github.event.inputs.target == 'creative-platform'
        run: |
          cd creative-platform
          git push origin main || echo "Already up to date"

      - name: 📤 Push agent-registry
        if: github.event.inputs.target == 'all' || github.event.inputs.target == 'agent-registry'
        run: |
          cd agent-registry
          git push origin main || echo "Already up to date"

      - name: ✅ Verify Deployments
        run: |
          echo "📊 Deployment Status"
          echo "===================="
          echo ""
          echo "✅ deployment-scripts pushed"
          echo "✅ creative-platform pushed"
          echo "✅ agent-registry pushed"
          echo ""
          echo "🎉 All repositories synchronized to GitHub"

      - name: 📧 Send Notification
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const status = context.payload.pull_request ? 'PR Updated' : 'Deployed';
            console.log(`✅ ${status}: All repositories synced to GitHub`);

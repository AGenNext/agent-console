web:
  image: ghcr.io/agennext/agent-console-web:latest
  replicas: 1
  port: 3000
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi

api:
  image: ghcr.io/agennext/agent-console-api:latest
  replicas: 1
  port: 8080
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 768Mi

serviceAccount:
  name: agent-console

ingress:
  enabled: false

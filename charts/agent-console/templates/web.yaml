apiVersion: apps/v1
kind: Deployment
metadata:
  name: agent-console-web
  labels:
    app.kubernetes.io/name: agent-console-web
    app.kubernetes.io/part-of: agent-console
spec:
  replicas: {{ .Values.web.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/name: agent-console-web
  template:
    metadata:
      labels:
        app.kubernetes.io/name: agent-console-web
        app.kubernetes.io/part-of: agent-console
    spec:
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: web
          image: {{ .Values.web.image }}
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: {{ .Values.web.port }}
          env:
            - name: NEXT_PUBLIC_API_BASE_URL
              value: http://agent-console-api:{{ .Values.api.port }}
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 30
            periodSeconds: 20
          resources:
            requests:
              cpu: {{ .Values.web.resources.requests.cpu }}
              memory: {{ .Values.web.resources.requests.memory }}
            limits:
              cpu: {{ .Values.web.resources.limits.cpu }}
              memory: {{ .Values.web.resources.limits.memory }}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            capabilities:
              drop: ["ALL"]
---
apiVersion: v1
kind: Service
metadata:
  name: agent-console-web
  labels:
    app.kubernetes.io/name: agent-console-web
    app.kubernetes.io/part-of: agent-console
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: agent-console-web
  ports:
    - name: http
      port: {{ .Values.web.port }}
      targetPort: http
